# =============================================================================
# Central Variable Reference — azurelocal-vmware-migration
# =============================================================================
# Copy this file to variables.yml and fill in your values.
# DO NOT commit variables.yml — it is .gitignore'd.
#
# All secrets use keyvault:// URIs — resolved at deploy time via Key Vault.
# =============================================================================

# -----------------------------------------------------------------------------
# Subscription & Global
# -----------------------------------------------------------------------------
subscription:
  subscription_id: "00000000-0000-0000-0000-000000000000"
  tenant_id: "00000000-0000-0000-0000-000000000000"
  location: "eastus"

# -----------------------------------------------------------------------------
# Security — Key Vault
# -----------------------------------------------------------------------------
security:
  key_vault_name: "kv-iic-platform"
  key_vault_resource_group: "rg-iic-mgmt-eus-01"
